<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prontuário — SGX</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <style>
    /* Prontuário da consulta (Leva 3) */
    .pront-sec {
      font-family: var(--font-body); font-size: var(--fs-base);
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--color-text-muted);
      margin: var(--space-5) 0 var(--space-3);
      padding-top: var(--space-4); border-top: 1px solid var(--color-border);
    }
    #pront-doc > .pront-sec:first-of-type {
      border-top: none; padding-top: 0; margin-top: 0;
    }
    @media print {
      .dash-sidebar, .sidebar, .pront-toolbar, .tabs { display: none !important; }
      #pront-doc.card { box-shadow: none !important; border: none !important; }
    }
  </style>
</head>
<body>

  <div class="dash" id="dash-root">
    <main class="dash-main">

      <!-- Visão normal (header + abas). Fica oculta quando o prontuário abre. -->
      <div id="normal-view">

      <!-- Breadcrumb -->
      <div style="margin-bottom: var(--space-4); font-size: var(--fs-sm); color: var(--color-text-muted);">
        <a id="breadcrumb-link" href="clinic-dashboard.html">← Voltar</a>
      </div>

      <!-- Header do paciente -->
      <div id="patient-header"></div>

      <!-- Banner da próxima consulta (com link, pra profissional clicar) -->
      <div id="appt-meeting-bar"></div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="overview">Visão geral</button>
        <button class="tab" data-tab="indicators">Indicadores respondidos</button>
        <button class="tab" data-tab="history">Histórico de triagens</button>
        <button class="tab" data-tab="exams">Exames moleculares</button>
        <button class="tab" data-tab="notes">Anotações clínicas</button>
      </div>

      <!-- Conteúdos das tabs -->
      <div id="tab-overview" class="tab-content active"></div>
      <div id="tab-indicators" class="tab-content"></div>
      <div id="tab-history" class="tab-content"></div>
      <div id="tab-exams" class="tab-content"></div>
      <div id="tab-notes" class="tab-content"></div>

      </div><!-- /#normal-view -->

      <!-- Visão de prontuário (tela cheia). Preenchida ao clicar numa consulta finalizada. -->
      <div id="prontuario-view" style="display:none;"></div>

    </main>
  </div>

  <!-- Modal: finalizar consulta -->
  <div id="finish-modal" class="modal-backdrop" style="display:none;">
    <div class="modal" style="max-width: 480px;">
      <div class="modal-header">
        <div>
          <h3>Finalizar consulta</h3>
          <p class="text-small text-muted">Marque o status desta consulta.</p>
        </div>
        <button class="modal-close" onclick="closeFinishModal()">×</button>
      </div>
      <div class="modal-body">
        <div style="display:flex; flex-direction:column; gap: var(--space-3);">
          <button class="btn btn-primary" style="background:#10b981; border-color:#10b981; padding: 14px; font-size: 15px;"
                  onclick="finishConsulta('completed')">
            ✓ Paciente compareceu — consulta realizada
          </button>
          <button class="btn btn-secondary" style="padding: 14px; font-size: 15px;"
                  onclick="finishConsulta('no_show')">
            ✕ Paciente não compareceu
          </button>
          <button class="btn" style="background:#dc2626; color:white; padding: 14px; font-size: 15px;"
                  onclick="finishConsulta('cancelled')">
            🚫 Cancelar consulta
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeFinishModal()">Voltar</button>
      </div>
    </div>
  </div>

  <!-- Modal de registro de exame -->
  <div id="exam-modal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3>Registrar exame molecular</h3>
          <p class="text-small text-muted">Preencha os dados do exame realizado.</p>
        </div>
        <button class="modal-close" onclick="closeExamModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="exam-type">Tipo de exame</label>
          <select class="select" id="exam-type">
            <option value="pcr">PCR</option>
            <option value="southern_blotting">Southern Blotting</option>
          </select>
        </div>
        <div class="grid gap-4" style="grid-template-columns: 1fr 1fr;">
          <div class="field">
            <label for="exam-date">Data do exame</label>
            <input class="input" id="exam-date" type="date" required>
          </div>
          <div class="field">
            <label for="exam-result">Resultado</label>
            <select class="select" id="exam-result">
              <option value="">Selecione...</option>
              <option value="positive">Positivo</option>
              <option value="negative">Negativo</option>
              <option value="inconclusive">Inconclusivo</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="exam-lab">Laboratório (opcional)</label>
          <input class="input" id="exam-lab" type="text" placeholder="Ex: Lab. Genética Molecular">
        </div>
        <div class="field">
          <label for="exam-notes">Observações (opcional)</label>
          <textarea class="textarea" id="exam-notes" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeExamModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitExam()" id="btn-submit-exam">Registrar exame</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/shared.js"></script>
  <script>
    if (!requireAuth(['doctor', 'nurse', 'admin', 'receptionist'])) { /* redireciona */ }

    document.getElementById('dash-root').insertAdjacentHTML('afterbegin', renderSidebar('patients'));

    const params      = new URLSearchParams(location.search);
    const patientId   = parseInt(params.get('id'), 10);
    // Pode mudar quando a médica troca de triagem pelo seletor / pelo histórico.
    let screeningId   = parseInt(params.get('screening'), 10) || null;
    // Modo de visualização: 'view' = somente leitura (vindo de Triagens)
    //                       default = completo (vindo de Consultas ou direto)
    const viewMode = params.get('mode') === 'view';

    // Ajustar breadcrumb conforme a origem
    const breadcrumbLink = document.getElementById('breadcrumb-link');
    if (breadcrumbLink) {
      const u = api.getUser();
      // Se veio com ?back=..., respeita esse retorno (preserva ano/mês/dia
      // do calendário, etc.) — usado pra recepção voltar pro calendário
      // no mesmo dia que estava olhando.
      const backParam = params.get('back');
      if (backParam === 'calendario') {
        const backQs = new URLSearchParams();
        ['year','month','date','doctor'].forEach(k => {
          const v = params.get(k);
          if (v) backQs.set(k, v);
        });
        breadcrumbLink.href = 'reception-calendar.html' + (backQs.toString() ? ('?' + backQs) : '');
        breadcrumbLink.textContent = '← Voltar para o calendário';
      } else if (backParam === 'minha-agenda') {
        const backQs = new URLSearchParams();
        ['view','year','month','date','list_period','list_priority'].forEach(k => {
          const v = params.get(k);
          if (v) backQs.set(k, v);
        });
        breadcrumbLink.href = 'doctor-appointments.html' + (backQs.toString() ? ('?' + backQs) : '');
        breadcrumbLink.textContent = '← Voltar para minha agenda';
      } else if (viewMode) {
        breadcrumbLink.href = 'clinic-dashboard.html';
        breadcrumbLink.textContent = '← Voltar para triagens';
      } else if (u && (u.role === 'doctor' || u.role === 'nurse')) {
        breadcrumbLink.href = 'doctor-appointments.html';
        breadcrumbLink.textContent = '← Voltar para consultas';
      } else if (u && u.role === 'receptionist') {
        breadcrumbLink.href = 'reception-calendar.html';
        breadcrumbLink.textContent = '← Voltar para o calendário';
      } else {
        breadcrumbLink.href = 'clinic-dashboard.html';
        breadcrumbLink.textContent = '← Voltar';
      }
    }

    if (!patientId) {
      toast.error('Paciente não especificado.');
      const u = api.getUser();
      const home = (u && typeof ROLE_HOME !== 'undefined' && ROLE_HOME[u.role])
        ? ROLE_HOME[u.role]
        : 'clinic-dashboard.html';
      setTimeout(() => location.href = home, 1000);
    }

    let patientData     = null;
    let screeningDetail = null;

    async function loadAll() {
      try {
        // Detalhe do paciente
        const p = await api.get(`/patients/get?id=${patientId}`);
        patientData = p;
        renderHeader(p.patient);
        renderMeetingBar();
        renderOverview(p);
        renderHistory(p.screenings);
        renderExams(p.exams);

        // Detalhe da triagem (se especificada, ou a mais recente)
        const sid = screeningId || (p.screenings[0]?.id);
        if (sid) {
          const s = await api.get(`/screenings/get?id=${sid}`);
          screeningDetail = s;
          renderIndicators(s);
          renderNotes(s.screening);
        } else {
          document.getElementById('tab-indicators').innerHTML =
            '<div class="empty-state"><div class="icon">📋</div>Sem triagens ainda.</div>';
        }
      } catch (err) {
        toast.error(err.message);
      }
    }

    function renderHeader(p) {
      const initials = getPatientInitials(p.full_name);
      const user = api.getUser();

      // Detecta se tem consulta agendada para HOJE com este paciente (e com este médico)
      const todayApt = findTodayAppointment();
      const canFinishConsulta = !viewMode && user.role === 'doctor' && todayApt;
      // Selo "Consulta finalizada": só quando a de hoje foi realizada E NÃO há
      // outra consulta agendada (se há próxima marcada, o foco passa a ser a próxima).
      const todayDone = !canFinishConsulta && user.role === 'doctor'
        && findTodayCompletedAppointment() && !findNextAppointment();

      document.getElementById('patient-header').innerHTML = `
        <div class="patient-header">
          <div class="avatar-lg">${escapeHtmlGlobal(initials)}</div>
          <div style="flex:1;min-width:0;">
            <h2>${escapeHtmlGlobal(p.full_name)}</h2>
            <div class="patient-meta">
              <span>📅 ${formatDateOnly(p.birth_date)} (${p.age} anos)</span>
              <span>${p.biological_sex === 'M' ? '♂ Masculino' : '♀ Feminino'}</span>
              ${p.cpf ? `<span>CPF: ${escapeHtmlGlobal(p.cpf)}</span>` : ''}
              ${p.user_email ? `<span>✉ ${escapeHtmlGlobal(p.user_email)}</span>` : ''}
              ${viewMode ? `<span style="color: var(--color-primary); font-weight: 600;">👁 Modo somente leitura</span>` : ''}
            </div>
          </div>
          <div class="patient-actions" style="display:flex; gap:var(--space-2); flex-wrap:wrap; align-items:center;">
            ${canFinishConsulta ? `
              <button class="btn btn-secondary" onclick="openFinishModal(${todayApt.id})" title="Marcar status desta consulta">
                ✓ Finalizar consulta
              </button>
            ` : (todayDone ? `
              <span style="display:inline-flex; align-items:center; gap:6px; background:#10b981; color:#fff; padding:8px 14px; border-radius:999px; font-size: var(--fs-sm); font-weight:600;">
                ✓ Consulta finalizada
              </span>
            ` : '')}
          </div>
        </div>
      `;
    }

    // Procura a consulta de HOJE (status scheduled) com o médico logado.
    // Retorna o objeto da consulta ou null.
    function findTodayAppointment() {
      if (!patientData || !patientData.appointments) return null;
      const user = api.getUser();
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);

      return patientData.appointments.find(a => {
        if (a.status !== 'scheduled') return false;
        const apptDate = new Date(String(a.scheduled_at).replace(' ', 'T'));
        return apptDate >= today && apptDate < tomorrow
            && (!a.doctor_user_id || Number(a.doctor_user_id) === Number(user.id));
      }) || null;
    }

    // Consulta de HOJE já finalizada (status completed) com o médico logado.
    function findTodayCompletedAppointment() {
      if (!patientData || !patientData.appointments) return null;
      const user = api.getUser();
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);

      return patientData.appointments.find(a => {
        if (a.status !== 'completed') return false;
        const apptDate = new Date(String(a.scheduled_at).replace(' ', 'T'));
        return apptDate >= today && apptDate < tomorrow
            && (!a.doctor_user_id || Number(a.doctor_user_id) === Number(user.id));
      }) || null;
    }

    // Próxima consulta futura (qualquer profissional). Usado no banner do topo.
    function findNextAppointment() {
      if (!patientData || !patientData.appointments) return null;
      const now = new Date();
      const futures = patientData.appointments
        .filter(a => a.status === 'scheduled'
                  && new Date(String(a.scheduled_at).replace(' ', 'T')) >= now)
        .sort((a, b) =>
          new Date(String(a.scheduled_at).replace(' ', 'T'))
        - new Date(String(b.scheduled_at).replace(' ', 'T'))
        );
      return futures[0] || null;
    }

    function renderMeetingBar() {
      const bar = document.getElementById('appt-meeting-bar');
      if (!bar) return;
      const u = api.getUser();
      // Só profissional (doctor/nurse/admin) vê esse banner.
      if (!u || u.role === 'patient' || u.role === 'receptionist') {
        bar.innerHTML = '';
        return;
      }
      const next = findNextAppointment();
      if (!next) { bar.innerHTML = ''; return; }

      const dt = new Date(String(next.scheduled_at).replace(' ', 'T'));
      const dateStr = dt.toLocaleDateString('pt-BR', {
        weekday: 'long', day: '2-digit', month: 'long'
      });
      const timeStr = dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
      const hasLink = next.meeting_link && String(next.meeting_link).trim() !== '';

      bar.innerHTML = `
        <div class="card" style="margin-bottom: var(--space-4); border-left: 4px solid var(--color-primary, #5b3a92);">
          <div style="display: flex; gap: var(--space-4); align-items: center; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 240px;">
              <div class="text-small text-muted" style="text-transform: uppercase; letter-spacing: 0.04em;">
                Próxima consulta
              </div>
              <div style="font-weight: 600; font-size: var(--fs-lg); margin-top: 2px; text-transform: capitalize;">
                ${dateStr} às ${timeStr}
              </div>
              ${ next.doctor_name ? `
                <div class="text-small text-muted" style="margin-top: 2px;">
                  Com ${escapeHtmlGlobal(next.doctor_name)}
                </div>
              ` : '' }
            </div>
            <div>
              ${ hasLink
                ? `<a class="btn btn-primary" href="${escapeHtmlGlobal(next.meeting_link)}" target="_blank" rel="noopener">🎥 Entrar na reunião</a>`
                : `<span class="text-small text-muted">Link da reunião ainda não cadastrado.</span>`
              }
            </div>
          </div>
        </div>
      `;
    }

    /* ===== Modal: Finalizar consulta ===== */
    let pendingFinishApptId = null;

    function openFinishModal(apptId) {
      pendingFinishApptId = apptId;
      document.getElementById('finish-modal').style.display = 'grid';
    }
    function closeFinishModal() {
      document.getElementById('finish-modal').style.display = 'none';
      pendingFinishApptId = null;
    }

    async function finishConsulta(newStatus) {
      if (!pendingFinishApptId) return;
      const labels = {
        completed: 'realizada',
        no_show:   'paciente não compareceu',
        cancelled: 'cancelada',
      };
      try {
        await api.post('/appointments/update', {
          id: pendingFinishApptId,
          status: newStatus,
        });
        toast.success(`Consulta marcada como ${labels[newStatus]}.`);
        closeFinishModal();
        // Recarrega dados pra esconder o botão (já não tem mais consulta scheduled)
        loadAll();
      } catch (err) {
        toast.error(err.message);
      }
    }

    function renderOverview(data) {
      const p = data.patient;
      const lastScreening = data.screenings[0];
      const lastExam = data.exams[0];
      const uploads = data.uploads || [];
      const socio   = data.socioeconomic;

      document.getElementById('tab-overview').innerHTML = `
        <div class="grid gap-4" style="grid-template-columns: 2fr 1fr;">
          <div class="card">
            <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-4);">
              Dados pessoais
            </h3>
            <dl class="def-list">
              <dt>Nome completo</dt>             <dd>${escapeHtmlGlobal(p.full_name)}</dd>
              <dt>Data de nascimento</dt>        <dd>${formatDateOnly(p.birth_date)} (${p.age} anos)</dd>
              <dt>Sexo biológico</dt>            <dd>${p.biological_sex === 'M' ? 'Masculino' : 'Feminino'}</dd>
              <dt>CPF</dt>                       <dd>${escapeHtmlGlobal(p.cpf || '—')}</dd>
              ${p.phone ? `
                <dt>Telefone do paciente</dt>    <dd>${escapeHtmlGlobal(p.phone)}</dd>
              ` : ''}
              <dt>E-mail de acesso</dt>          <dd>${escapeHtmlGlobal(p.user_email || '—')}</dd>
              <dt>Cadastrado em</dt>             <dd>${formatDateBR(p.created_at)}</dd>
              ${p.guardian_name ? `
                <dt>Responsável</dt>             <dd>${escapeHtmlGlobal(p.guardian_name)} (${escapeHtmlGlobal(p.guardian_relationship || '—')})</dd>
                <dt>Telefone do responsável</dt> <dd>${escapeHtmlGlobal(p.guardian_phone || '—')}</dd>
              ` : ''}
              ${p.zip_code || p.street ? `
                <dt>Endereço</dt>
                <dd>
                  ${escapeHtmlGlobal(p.street || '—')}, ${escapeHtmlGlobal(p.number || '—')}${p.complement ? ' — ' + escapeHtmlGlobal(p.complement) : ''}
                  <br>${escapeHtmlGlobal(p.neighborhood || '—')} — ${escapeHtmlGlobal(p.city || '—')}/${escapeHtmlGlobal(p.state || '—')}
                  <br>CEP ${escapeHtmlGlobal(p.zip_code || '—')}
                </dd>
              ` : ''}
            </dl>
            ${p.family_history_notes ? `
              <div style="margin-top: var(--space-4); padding-top: var(--space-4); border-top: 1px solid var(--color-border);">
                <h4 style="font-family: var(--font-body); font-size: var(--fs-sm); text-transform: uppercase; letter-spacing: 0.04em; color: var(--color-text-muted); margin-bottom: var(--space-2);">
                  Histórico familiar relatado
                </h4>
                <p style="white-space: pre-wrap; font-size: var(--fs-sm); line-height: 1.55;">${escapeHtmlGlobal(p.family_history_notes)}</p>
                <p class="text-small text-muted" style="margin-top: var(--space-2);">
                  Relato livre do paciente/responsável. Não entra no cálculo do score.
                </p>
              </div>
            ` : ''}
          </div>

          <div class="card">
            <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-4);">
              Resumo clínico
            </h3>
            ${lastScreening ? `
              <div style="margin-bottom: var(--space-4);">
                <div class="text-small text-muted" style="margin-bottom: var(--space-2);">Última triagem</div>
                ${priorityBadge(lastScreening.priority)}
                <div style="margin-top: var(--space-3); font-size: var(--fs-sm);">
                  <div>Score: <strong>${Number(lastScreening.score || 0).toFixed(2)}</strong>
                       (limiar ${Number(lastScreening.threshold_applied || 0).toFixed(2)})</div>
                  <div style="margin-top: var(--space-1);">
                    Recomendação: <strong>${recommendationLabel(lastScreening.recommendation)}</strong>
                  </div>
                  <div class="text-small text-muted" style="margin-top: var(--space-2);">
                    Enviada em ${formatDateBR(lastScreening.submitted_at)}
                  </div>
                </div>
              </div>
            ` : '<div class="text-small text-muted">Sem triagens.</div>'}

            <div style="border-top: 1px solid var(--color-border); padding-top: var(--space-3);">
              <div class="text-small text-muted" style="margin-bottom: var(--space-2);">Exames</div>
              ${lastExam ? `
                <div style="font-size: var(--fs-sm);">
                  <strong>${lastExam.exam_type === 'pcr' ? 'PCR' : 'Southern Blotting'}</strong> —
                  <span class="answer-pill ${lastExam.result === 'positive' ? 'yes' : (lastExam.result === 'negative' ? 'no' : 'unknown')}">
                    ${lastExam.result === 'positive' ? 'Positivo' : (lastExam.result === 'negative' ? 'Negativo' : 'Inconclusivo')}
                  </span>
                  <div class="text-small text-muted" style="margin-top: var(--space-1);">
                    ${formatDateOnly(lastExam.exam_date)}
                  </div>
                </div>
              ` : '<div class="text-small text-muted">Nenhum exame registrado.</div>'}
            </div>
          </div>
        </div>

        ${renderSocioeconomicCard(socio)}
      `;
    }

    // Anexos (fotos + requisição) de UMA triagem — mostrados junto dos indicadores
    // quando a médica seleciona a triagem (em vez de soltos na Visão geral).
    function renderUploadsForScreening(sid) {
      const labels = { photo_front: 'Foto de frente', photo_side: 'Foto de perfil', medical_request: 'Requisição médica' };
      const order = ['photo_front', 'photo_side', 'medical_request'];
      const ups = (patientData && patientData.uploads) || [];
      const screenings = (patientData && patientData.screenings) || [];
      const oldestId = screenings.length ? Number(screenings[screenings.length - 1].id) : null;
      const isOldest = Number(sid) === oldestId;
      const byKind = {};
      ups.forEach(u => {
        // Anexos desta triagem: o screening_id bate; ou, se for legado (sem vínculo),
        // mostra na triagem mais antiga (vieram do cadastro inicial).
        const matches = Number(u.screening_id) === Number(sid) || (!u.screening_id && isOldest);
        if (matches && !byKind[u.kind]) byKind[u.kind] = u;
      });
      const slot = (kind) => {
        const u = byKind[kind];
        if (!u) {
          return `<div style="padding: var(--space-3); border: 1px dashed var(--color-border); border-radius: 8px;">
            <div class="text-small text-muted">${labels[kind]}</div>
            <div class="text-small" style="margin-top: var(--space-1); color: var(--color-text-muted);">— não enviado —</div>
          </div>`;
        }
        const url = `/sgx/backend/api/uploads/get.php?id=${u.id}`;
        const isImg = u.mime_type && u.mime_type.startsWith('image/');
        return `<div style="padding: var(--space-3); border: 1px solid var(--color-border); border-radius: 8px;">
          <div class="text-small text-muted">${labels[kind]}</div>
          <div style="margin-top: var(--space-2);">
            ${ isImg
              ? `<a href="${url}" target="_blank" rel="noopener"><img src="${url}" alt="${labels[kind]}" style="width: 100%; max-height: 160px; object-fit: cover; border-radius: 6px;" /></a>`
              : `<a href="${url}" target="_blank" rel="noopener" class="btn btn-ghost" style="display: inline-block;">📄 Abrir ${escapeHtmlGlobal(u.original_name)}</a>` }
          </div>
          <div class="text-small text-muted" style="margin-top: var(--space-2);">
            ${escapeHtmlGlobal(u.original_name)}<br>${formatDateBR(u.created_at)} · ${Math.round((u.size_bytes || 0) / 1024)} KB
          </div>
        </div>`;
      };
      return `
        <div class="card" style="margin-bottom: var(--space-4);">
          <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-3);">Anexos desta triagem</h3>
          <div class="grid gap-3" style="grid-template-columns: repeat(3, 1fr);">
            ${order.map(slot).join('')}
          </div>
        </div>`;
    }

    function renderUploadsCard(uploads) {
      const labels = {
        photo_front:     'Foto de frente',
        photo_side:      'Foto de perfil',
        medical_request: 'Requisição médica',
      };
      const order = ['photo_front', 'photo_side', 'medical_request'];
      const ups = uploads || [];

      // Agrupa por triagem (screening_id). 'none' = anexo antigo, sem vínculo.
      // Os uploads vêm ordenados por created_at DESC, então o 1º de cada tipo
      // dentro do grupo é o mais recente.
      const groups = {};
      ups.forEach(u => {
        const sid = u.screening_id ? String(u.screening_id) : 'none';
        if (!groups[sid]) groups[sid] = {};
        if (!groups[sid][u.kind]) groups[sid][u.kind] = u;
      });

      const screenings = (patientData && patientData.screenings) || [];
      // Ordem: triagens mais recentes primeiro, depois "sem vínculo".
      const sidOrder = screenings.map(s => String(s.id)).filter(sid => groups[sid]);
      Object.keys(groups).forEach(sid => {
        if (sid !== 'none' && !sidOrder.includes(sid)) sidOrder.push(sid);
      });
      if (groups['none']) sidOrder.push('none');

      const renderSlot = (kind, u) => {
        if (!u) {
          return `
            <div style="padding: var(--space-3); border: 1px dashed var(--color-border); border-radius: 8px;">
              <div class="text-small text-muted">${labels[kind]}</div>
              <div class="text-small" style="margin-top: var(--space-1); color: var(--color-text-muted);">— não enviado —</div>
            </div>`;
        }
        const url = `/sgx/backend/api/uploads/get.php?id=${u.id}`;
        const isImg = u.mime_type && u.mime_type.startsWith('image/');
        return `
          <div style="padding: var(--space-3); border: 1px solid var(--color-border); border-radius: 8px;">
            <div class="text-small text-muted">${labels[kind]}</div>
            <div style="margin-top: var(--space-2);">
              ${ isImg
                ? `<a href="${url}" target="_blank" rel="noopener"><img src="${url}" alt="${labels[kind]}" style="width: 100%; max-height: 160px; object-fit: cover; border-radius: 6px;" /></a>`
                : `<a href="${url}" target="_blank" rel="noopener" class="btn btn-ghost" style="display: inline-block;">📄 Abrir ${escapeHtmlGlobal(u.original_name)}</a>` }
            </div>
            <div class="text-small text-muted" style="margin-top: var(--space-2);">
              ${escapeHtmlGlobal(u.original_name)}<br>
              ${formatDateBR(u.created_at)} · ${Math.round((u.size_bytes || 0) / 1024)} KB
            </div>
          </div>`;
      };

      let inner;
      if (sidOrder.length === 0) {
        inner = '<p class="text-small text-muted">Nenhum anexo enviado.</p>';
      } else {
        inner = sidOrder.map(sid => {
          let titulo;
          if (sid === 'none') {
            titulo = 'Anexos sem triagem vinculada';
          } else {
            const sc = screenings.find(s => String(s.id) === String(sid));
            titulo = sc
              ? `Triagem #${sid} · ${formatDateBR(sc.submitted_at || sc.created_at)}`
              : `Triagem #${sid}`;
          }
          const g = groups[sid];
          return `
            <div style="margin-top: var(--space-4);">
              <div class="text-small text-muted" style="text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: var(--space-2);">${escapeHtmlGlobal(titulo)}</div>
              <div class="grid gap-3" style="grid-template-columns: repeat(3, 1fr);">
                ${order.map(kind => renderSlot(kind, g[kind])).join('')}
              </div>
            </div>`;
        }).join('');
      }

      return `
        <div class="card" style="margin-top: var(--space-4);">
          <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-2);">
            Anexos enviados pelo paciente
          </h3>
          ${inner}
        </div>
      `;
    }

    function renderSocioeconomicCard(socio) {
      if (!socio) {
        return `
          <div class="card" style="margin-top: var(--space-4);">
            <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-3);">
              Triagem socioeconômica
            </h3>
            <p class="text-small text-muted">Não preenchida.</p>
          </div>
        `;
      }

      const incomeLabels = {
        up_to_1: 'Até 1 salário mínimo',
        '1_to_2': 'De 1 a 2 salários',
        '2_to_3': 'De 2 a 3 salários',
        above_3: 'Mais de 3 salários',
      };
      const workLabels = {
        formal: 'Emprego formal', informal: 'Trabalho informal/autônomo',
        unemployed: 'Desempregado(a)', retired: 'Aposentado(a)/pensionista',
      };
      const eduLabels = {
        fundamental_incomplete: 'Fundamental incompleto', fundamental_complete: 'Fundamental completo',
        high_school_incomplete: 'Médio incompleto',       high_school_complete: 'Médio completo',
        higher_incomplete:      'Superior incompleto',    higher_complete:      'Superior completo',
        postgrad_incomplete:    'Pós-graduação incompleta', postgrad_complete:  'Pós-graduação completa',
      };

      const perCap = socio.per_capita_est_sm;
      const perCapTxt = perCap !== null && perCap !== undefined
        ? `${perCap.toFixed(2)} salário(s) mínimo(s) per capita (estimativa)`
        : '—';

      return `
        <div class="card" style="margin-top: var(--space-4);">
          <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-4);">
            Triagem socioeconômica
          </h3>
          <dl class="def-list">
            <dt>Pessoas na casa</dt>          <dd>${escapeHtmlGlobal(socio.household_size)}</dd>
            <dt>Renda da família</dt>         <dd>${escapeHtmlGlobal(incomeLabels[socio.income_range] || '—')}</dd>
            <dt>Benefício social</dt>         <dd>${socio.receives_benefit ? ('Sim' + (socio.benefit_details ? ' — ' + escapeHtmlGlobal(socio.benefit_details) : '')) : 'Não'}</dd>
            <dt>Trabalho do provedor</dt>     <dd>${escapeHtmlGlobal(workLabels[socio.provider_work_status] || '—')}</dd>
            <dt>Plano de saúde</dt>           <dd>${socio.has_health_plan ? 'Sim' : 'Não'}</dd>
            <dt>Escolaridade do provedor</dt> <dd>${escapeHtmlGlobal(eduLabels[socio.provider_education] || '—')}</dd>
            <dt>Renda per capita</dt>         <dd>${perCapTxt}</dd>
            ${socio.observations ? `
              <dt>Observações</dt>            <dd style="white-space: pre-wrap;">${escapeHtmlGlobal(socio.observations)}</dd>
            ` : ''}
          </dl>
          <p class="text-small text-muted" style="margin-top: var(--space-3);">
            Esses dados servem para a equipe clínica conhecer o contexto da família.
            A decisão sobre apoio é sempre manual — o sistema não decide nada automaticamente.
          </p>
        </div>
      `;
    }

    // Estado da edição de indicadores (uma só por vez)
    let indicatorsEditMode = false;
    let editedAnswers = {}; // { indicator_id: { answer, observation } }

    function renderIndicators(s) {
      const cats = s.answers_by_category;
      const labels = { development: 'Desenvolvimento', behavioral: 'Comportamento', physical: 'Características físicas' };
      const ansLabel = { yes: 'Sim', no: 'Não', unknown: 'Não sei' };

      const user = api.getUser();
      // Só doctor/admin podem editar. E só se for a triagem mais recente
      // (ou seja, sem ?screening= explícito, ou explicitamente == mais recente).
      const isLatest = !screeningId || (patientData?.screenings?.[0]?.id === s.screening.id);
      const canEdit = !viewMode && isLatest &&
        (user?.role === 'doctor' || user?.role === 'admin');

      // Botão de toggle de edição
      let header = '';
      if (canEdit) {
        header = `
          <div style="display: flex; justify-content: flex-end; margin-bottom: var(--space-3); gap: var(--space-2);">
            ${ indicatorsEditMode ? `
              <button class="btn btn-ghost" onclick="cancelEditIndicators()">Cancelar</button>
              <button class="btn btn-primary" onclick="saveEditIndicators(${s.screening.id})">Salvar alterações</button>
            ` : `
              <button class="btn btn-secondary" onclick="startEditIndicators()">✎ Editar respostas</button>
            `}
          </div>
        `;
      }

      // Lista de indicadores
      let html = '<div class="indicator-summary">';
      Object.entries(cats).forEach(([cat, items]) => {
        if (items.length === 0) return;
        html += `<div class="indicator-cat">
          <h4>${labels[cat]}</h4>`;
        items.forEach(i => {
          if (indicatorsEditMode) {
            // Pega o valor editado (se já mexeu) ou o original
            const current = editedAnswers[i.indicator_id]
              ? editedAnswers[i.indicator_id].answer
              : i.answer;
            html += `
              <div class="indicator-row" style="flex-wrap: wrap;">
                <span class="label" style="flex: 1; min-width: 220px;">${escapeHtmlGlobal(i.lay_label)}</span>
                <span style="display: flex; gap: 4px;">
                  ${['yes','no','unknown'].map(opt => `
                    <label style="cursor: pointer; padding: 4px 10px;
                                  border: 1px solid var(--color-border); border-radius: 6px;
                                  ${current === opt ? 'background: var(--color-primary, #5b3a92); color: white; border-color: var(--color-primary, #5b3a92);' : 'background: white;'}">
                      <input type="radio" name="ind-${i.indicator_id}" value="${opt}"
                             ${current === opt ? 'checked' : ''}
                             onchange="onAnswerChange(${i.indicator_id}, '${opt}')"
                             style="display: none;">
                      ${ansLabel[opt]}
                    </label>
                  `).join('')}
                </span>
              </div>`;
          } else {
            html += `<div class="indicator-row">
              <span class="label">${escapeHtmlGlobal(i.lay_label)}</span>
              <span class="answer-pill ${i.answer}">${ansLabel[i.answer]}</span>
            </div>`;
          }
        });
        html += '</div>';
      });
      html += '</div>';

      // Aviso no modo edição
      const editNotice = indicatorsEditMode
        ? `<div class="card" style="background: #fff7e6; border: 1px solid #f0b95a; margin-bottom: var(--space-4); padding: var(--space-3);">
            <strong>Modo de edição.</strong> Ajuste as respostas e clique em "Salvar alterações".
            O score e a prioridade serão recalculados automaticamente.
          </div>`
        : '';

      // Resumo do score (não aparece em modo edição pra evitar confusão de valores antigos)
      const scoreCard = indicatorsEditMode ? '' : `
        <div class="card" style="margin-bottom: var(--space-4);">
          <div class="grid gap-4" style="grid-template-columns: repeat(4, 1fr);">
            <div>
              <div class="text-small text-muted">Score calculado</div>
              <div style="font-family: var(--font-display); font-size: var(--fs-3xl); font-weight: 500;">
                ${Number(s.screening.score).toFixed(3)}
              </div>
            </div>
            <div>
              <div class="text-small text-muted">Limiar (${s.screening.patient_sex})</div>
              <div style="font-family: var(--font-display); font-size: var(--fs-2xl); font-weight: 500;">
                ${Number(s.screening.threshold_applied).toFixed(3)}
              </div>
            </div>
            <div>
              <div class="text-small text-muted">Prioridade</div>
              <div style="margin-top: var(--space-2);">${priorityBadge(s.screening.priority)}</div>
            </div>
            <div>
              <div class="text-small text-muted">Recomendação</div>
              <div style="font-weight: 600; margin-top: var(--space-2);">
                ${recommendationLabel(s.screening.recommendation)}
              </div>
            </div>
          </div>
        </div>
      `;

      // Cabeçalho + seletor de triagem (a tela das médicas é "ciente de triagem").
      const allScr = (patientData && patientData.screenings) || [];
      const cur    = allScr.find(sc => Number(sc.id) === Number(s.screening.id));
      const curDate = cur ? formatDateBR(cur.submitted_at || cur.created_at) : '';
      const triagemBar = `
        <div class="card" style="margin-bottom: var(--space-4); display:flex; align-items:flex-end; justify-content:space-between; gap: var(--space-3); flex-wrap:wrap;">
          <div>
            <div class="text-small text-muted">Triagem selecionada</div>
            <div style="font-weight:600; font-size: var(--fs-lg);">Triagem #${s.screening.id}${curDate ? ' · ' + curDate : ''}</div>
          </div>
          ${ allScr.length > 1 ? `
            <div class="field" style="margin:0; min-width: 240px;">
              <label class="text-small text-muted" for="triagem-select" style="margin-bottom:4px;">Ver outra triagem</label>
              <select class="select" id="triagem-select" onchange="selectScreening(this.value)">
                ${allScr.map(sc => `<option value="${sc.id}" ${Number(sc.id) === Number(s.screening.id) ? 'selected' : ''}>Triagem #${sc.id} · ${formatDateBR(sc.submitted_at || sc.created_at)}</option>`).join('')}
              </select>
            </div>
          ` : '' }
        </div>`;

      // Anexos da triagem selecionada aparecem junto dos indicadores (a não ser
      // no modo edição, pra não poluir).
      const anexos = indicatorsEditMode ? '' : renderUploadsForScreening(s.screening.id);
      document.getElementById('tab-indicators').innerHTML = triagemBar + header + editNotice + scoreCard + anexos + html;
    }

    // Troca a triagem em foco (pelo seletor da aba ou pelo clique no histórico),
    // recarrega indicadores + anotações e vai pra aba de indicadores. Sem reload.
    async function selectScreening(sid) {
      sid = parseInt(sid, 10);
      if (!sid) return;
      screeningId = sid;          // afeta o "isLatest" (permissão de editar)
      indicatorsEditMode = false;
      editedAnswers = {};
      try {
        const sdata = await api.get('/screenings/get?id=' + sid);
        screeningDetail = sdata;
        renderIndicators(sdata);
        renderNotes(sdata.screening);
        activateTab('indicators');
      } catch (err) {
        toast.error(err.message || 'Não foi possível abrir essa triagem.');
      }
    }

    /* ===== Edição de respostas (handlers globais) ===== */
    function startEditIndicators() {
      indicatorsEditMode = true;
      editedAnswers = {};
      renderIndicators(screeningDetail);
    }
    function cancelEditIndicators() {
      indicatorsEditMode = false;
      editedAnswers = {};
      renderIndicators(screeningDetail);
    }
    function onAnswerChange(indicatorId, newAnswer) {
      editedAnswers[indicatorId] = { answer: newAnswer };
      // Re-render só os botões (pra atualizar o "selected" visual)
      renderIndicators(screeningDetail);
    }
    async function saveEditIndicators(screeningIdToSave) {
      const changedIds = Object.keys(editedAnswers).map(Number);
      if (changedIds.length === 0) {
        // Saiu do modo edição sem mudar nada
        indicatorsEditMode = false;
        renderIndicators(screeningDetail);
        return;
      }

      if (!confirm(`Você alterou ${changedIds.length} resposta(s). O score e a prioridade serão recalculados automaticamente.\n\nConfirmar?`)) {
        return;
      }

      // Monta payload com as respostas alteradas (e mantém observation existente)
      const allAnswers = [];
      Object.values(screeningDetail.answers_by_category).flat().forEach(i => {
        if (editedAnswers[i.indicator_id]) {
          allAnswers.push({
            indicator_id: i.indicator_id,
            answer: editedAnswers[i.indicator_id].answer,
            observation: i.observation || null,
          });
        }
      });

      try {
        const res = await api.post('/screenings/edit-answers', {
          screening_id: screeningIdToSave,
          answers: allAnswers,
        });
        if (res.changed) {
          const priorityChanged = res.old_priority !== res.new_priority;
          toast.success(
            `Respostas salvas. Score: ${Number(res.old_score).toFixed(3)} → ${Number(res.new_score).toFixed(3)}`
            + (priorityChanged ? ` (prioridade mudou: ${res.old_priority} → ${res.new_priority})` : '')
          );
        } else {
          toast.success('Nenhuma alteração feita.');
        }
        indicatorsEditMode = false;
        editedAnswers = {};
        // Recarrega tudo pra refletir o novo score
        loadAll();
      } catch (err) {
        toast.error(err.message || 'Erro ao salvar.');
      }
    }

    function renderHistory(screenings) {
      const appts = patientData.appointments || [];

      let html = '';

      // Seção: Consultas
      html += '<h3 style="font-family: var(--font-display); font-size: var(--fs-xl); margin: 0 0 var(--space-3) 0;">Consultas</h3>';
      if (appts.length === 0) {
        html += '<div class="empty-state" style="margin-bottom: var(--space-5);"><div class="icon">📅</div>Nenhuma consulta agendada.</div>';
      } else {
        const STATUS_BADGES = {
          scheduled: '<span class="badge badge-info">Agendada</span>',
          completed: '<span class="answer-pill no">Realizada</span>',
          cancelled: '<span class="answer-pill yes">Cancelada</span>',
          no_show:   '<span class="answer-pill unknown">Não compareceu</span>',
        };
        html += `<div class="history-list" style="margin-bottom: var(--space-5);">`
          + appts.map(a => {
            // Consulta REALIZADA ou AGENDADA abre o prontuário. Na agendada, a médica
            // já pode adiantar a anotação clínica (fica pronta quando a consulta acontecer).
            const canOpen = a.status === 'completed' || a.status === 'scheduled';
            return `
            <div class="history-item${canOpen ? ' consulta-item' : ''}"
                 ${canOpen ? `style="cursor: pointer;" onclick="openProntuario(${a.id})"` : ''}>
              <div>
                <div class="history-date">${formatDateBR(a.scheduled_at)}</div>
                <div style="font-weight: 600; margin-bottom: var(--space-1);">
                  Consulta ${a.doctor_name ? 'com ' + escapeHtmlGlobal(a.doctor_name) : ''}
                </div>
                <div class="text-small text-muted">
                  ${a.location ? escapeHtmlGlobal(a.location) : 'Local não informado'}
                  ${a.notes ? ' · ' + escapeHtmlGlobal(a.notes) : ''}
                </div>
              </div>
              <div style="text-align: right; white-space: nowrap;">
                ${STATUS_BADGES[a.status] || a.status}
                ${canOpen ? `<div class="text-small" style="margin-top: var(--space-2); color: var(--color-primary); font-weight: 600;">${a.status === 'scheduled' ? 'abrir / anotar →' : 'ver prontuário →'}</div>` : ''}
              </div>
            </div>`;
          }).join('') + '</div>';
      }

      // Seção: Triagens
      html += '<h3 style="font-family: var(--font-display); font-size: var(--fs-xl); margin: 0 0 var(--space-3) 0;">Triagens</h3>';
      if (screenings.length === 0) {
        html += '<div class="empty-state"><div class="icon">📋</div>Sem triagens ainda.</div>';
      } else {
        html += `<div class="history-list">` + screenings.map(s => `
          <div class="history-item ${s.priority || ''}" style="cursor:pointer;" onclick="selectScreening(${s.id})">
            <div>
              <div class="history-date">${formatDateBR(s.submitted_at || s.created_at)}</div>
              <div style="font-weight: 600; margin-bottom: var(--space-1);">
                Triagem #${s.id}
              </div>
              <div class="text-small text-muted">
                Score: ${Number(s.score || 0).toFixed(2)} ·
                ${recommendationLabel(s.recommendation)} ·
                ${statusLabel(s.status)}
              </div>
            </div>
            <div style="text-align: right;">
              ${priorityBadge(s.priority)}
              ${s.performed_by ? `<div class="text-small text-muted" style="margin-top: var(--space-2);">por ${escapeHtmlGlobal(s.performed_by)}</div>` : ''}
            </div>
          </div>
        `).join('') + '</div>';
      }

      document.getElementById('tab-history').innerHTML = html;
    }

    /* ===================================================================
       PRONTUÁRIO DA CONSULTA (Leva 3)
       Abre em tela cheia ao clicar numa consulta FINALIZADA.
       Consolida, no estilo de prontuário médico, os dados que o sistema
       já tem: identificação, responsável, triagem/indicadores,
       socioeconômica, anexos (fotos), exames e as anotações da consulta.
       O botão "Revisar" adiciona uma anotação nova (append-only).
       =================================================================== */
    let prontuarioApptId = null;

    async function openProntuario(apptId) {
      const appt = (patientData.appointments || []).find(a => Number(a.id) === Number(apptId));
      if (!appt) { toast.error('Consulta não encontrada.'); return; }
      prontuarioApptId = apptId;

      document.getElementById('normal-view').style.display = 'none';
      const view = document.getElementById('prontuario-view');
      view.style.display = 'block';
      view.innerHTML = '<div class="card"><div class="text-small text-muted">Carregando prontuário...</div></div>';
      window.scrollTo(0, 0);

      let notes = [];
      try {
        const res = await api.get('/appointments/notes/list?appointment_id=' + apptId);
        notes = res.notes || [];
      } catch (err) {
        // Mostra o prontuário mesmo sem conseguir as anotações; avisa no rodapé.
        notes = null;
      }
      view.innerHTML = renderProntuario(appt, notes);
      window.scrollTo(0, 0);
    }

    function closeProntuario() {
      prontuarioApptId = null;
      document.getElementById('prontuario-view').style.display = 'none';
      document.getElementById('normal-view').style.display = 'block';
      // Volta para a aba "Histórico de triagens", de onde a consulta foi clicada
      activateTab('history');
      window.scrollTo(0, 0);
    }

    function renderProntuario(appt, notes) {
      const p     = patientData.patient;
      const exams = patientData.exams || [];
      const socio = patientData.socioeconomic;
      const uploads = patientData.uploads || [];
      const user  = api.getUser();

      const statusLabels = {
        completed: 'Realizada', scheduled: 'Agendada',
        cancelled: 'Cancelada', no_show: 'Paciente não compareceu',
      };
      const canRevisar = !viewMode && user && user.role === 'doctor'
        && appt && Number(appt.doctor_user_id) === Number(user.id);

      // ----- Identificação -----
      const identificacao = `
        <h4 class="pront-sec">Identificação do paciente</h4>
        <dl class="def-list">
          <dt>Nome completo</dt>      <dd>${escapeHtmlGlobal(p.full_name)}</dd>
          <dt>Data de nascimento</dt> <dd>${formatDateOnly(p.birth_date)} (${p.age} anos)</dd>
          <dt>Sexo biológico</dt>     <dd>${p.biological_sex === 'M' ? 'Masculino' : 'Feminino'}</dd>
          <dt>CPF</dt>                <dd>${escapeHtmlGlobal(p.cpf || '—')}</dd>
          ${p.phone ? `<dt>Telefone</dt> <dd>${escapeHtmlGlobal(p.phone)}</dd>` : ''}
          <dt>E-mail</dt>             <dd>${escapeHtmlGlobal(p.user_email || '—')}</dd>
          <dt>Nº do prontuário</dt>   <dd>${escapeHtmlGlobal(String(p.id))}</dd>
          ${(p.zip_code || p.street) ? `
            <dt>Endereço</dt>
            <dd>
              ${escapeHtmlGlobal(p.street || '—')}, ${escapeHtmlGlobal(p.number || '—')}${p.complement ? ' — ' + escapeHtmlGlobal(p.complement) : ''}
              <br>${escapeHtmlGlobal(p.neighborhood || '—')} — ${escapeHtmlGlobal(p.city || '—')}/${escapeHtmlGlobal(p.state || '—')}
              <br>CEP ${escapeHtmlGlobal(p.zip_code || '—')}
            </dd>
          ` : ''}
        </dl>`;

      // ----- Responsável -----
      const responsavel = p.guardian_name ? `
        <h4 class="pront-sec">Dados do responsável</h4>
        <dl class="def-list">
          <dt>Nome completo</dt> <dd>${escapeHtmlGlobal(p.guardian_name)}</dd>
          <dt>Parentesco</dt>    <dd>${escapeHtmlGlobal(p.guardian_relationship || '—')}</dd>
          <dt>Telefone</dt>      <dd>${escapeHtmlGlobal(p.guardian_phone || '—')}</dd>
        </dl>` : '';

      // ----- Histórico clínico / Triagem -----
      let triagem = '';
      if (screeningDetail && screeningDetail.answers_by_category) {
        const cats = screeningDetail.answers_by_category;
        const labels = { development: 'Desenvolvimento', behavioral: 'Comportamento', physical: 'Características físicas' };
        const ansLabel = { yes: 'Sim', no: 'Não', unknown: 'Não sei' };
        const s = screeningDetail.screening;
        let inner = '<div class="indicator-summary">';
        Object.entries(cats).forEach(([cat, items]) => {
          if (!items.length) return;
          inner += `<div class="indicator-cat"><h4>${labels[cat] || cat}</h4>`;
          items.forEach(i => {
            inner += `<div class="indicator-row"><span class="label">${escapeHtmlGlobal(i.lay_label)}</span>`
                   + `<span class="answer-pill ${i.answer}">${ansLabel[i.answer]}</span></div>`;
          });
          inner += '</div>';
        });
        inner += '</div>';
        triagem = `
          <h4 class="pront-sec">Histórico clínico — Triagem</h4>
          <div class="text-small text-muted" style="margin-bottom: var(--space-3);">
            Score <strong>${Number(s.score || 0).toFixed(2)}</strong>
            (limiar ${Number(s.threshold_applied || 0).toFixed(2)}) ·
            Prioridade ${priorityBadge(s.priority)} ·
            Recomendação: <strong>${recommendationLabel(s.recommendation)}</strong>
          </div>
          ${inner}`;
      } else {
        triagem = '<h4 class="pront-sec">Histórico clínico — Triagem</h4>'
                + '<p class="text-small text-muted">Nenhuma triagem registrada para este paciente.</p>';
      }
      // Histórico familiar relatado (texto livre do paciente)
      if (p.family_history_notes) {
        triagem += `
          <div style="margin-top: var(--space-4);">
            <div class="text-small text-muted" style="text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: var(--space-2);">
              Antecedentes familiares (relato livre)
            </div>
            <p style="white-space: pre-wrap; line-height: 1.55;">${escapeHtmlGlobal(p.family_history_notes)}</p>
          </div>`;
      }

      // ----- Exames moleculares -----
      const examTypeLabel = { pcr: 'PCR', southern_blotting: 'Southern Blotting' };
      const resultLabel = { positive: 'Positivo', negative: 'Negativo', inconclusive: 'Inconclusivo' };
      const resultClass = { positive: 'yes', negative: 'no', inconclusive: 'unknown' };
      let examesHtml = '<h4 class="pront-sec">Exames moleculares</h4>';
      if (!exams.length) {
        examesHtml += '<p class="text-small text-muted">Nenhum exame molecular registrado.</p>';
      } else {
        examesHtml += '<div class="table-wrapper"><table class="data-table"><thead><tr>'
          + '<th>Tipo</th><th>Data</th><th>Resultado</th><th>Laboratório</th><th>Observações</th>'
          + '</tr></thead><tbody>'
          + exams.map(e => `
            <tr>
              <td><strong>${examTypeLabel[e.exam_type] || e.exam_type}</strong></td>
              <td>${formatDateOnly(e.exam_date)}</td>
              <td><span class="answer-pill ${resultClass[e.result]}">${resultLabel[e.result]}</span></td>
              <td>${escapeHtmlGlobal(e.laboratory || '—')}</td>
              <td class="text-small text-muted">${escapeHtmlGlobal(e.notes || '—')}</td>
            </tr>`).join('')
          + '</tbody></table></div>';
      }

      // ----- Anotações clínicas + Revisar -----
      // Mostra DUAS origens:
      //  1) a anotação clínica salva junto da triagem (campo clinical_notes) — a
      //     "Anotações clínicas" antiga, que a médica já vinha usando;
      //  2) as anotações por consulta (appointment_notes), adicionadas pelo Revisar.
      let anotacoes = '<h4 class="pront-sec">Anotações clínicas</h4>';
      let temAlguma = false;

      const clinicalLegacy = (screeningDetail && screeningDetail.screening
        && screeningDetail.screening.clinical_notes) ? String(screeningDetail.screening.clinical_notes).trim() : '';
      if (clinicalLegacy) {
        temAlguma = true;
        anotacoes += `
          <div style="background: #fff7e6; border-left: 3px solid #f0b95a; border-radius: var(--radius); padding: var(--space-3); margin-bottom: var(--space-3);">
            <div style="white-space: pre-wrap; line-height: var(--lh-normal);">${escapeHtmlGlobal(clinicalLegacy)}</div>
            <div class="text-small text-muted" style="margin-top: var(--space-2);">
              Anotação registrada na triagem #${screeningDetail.screening.id}
            </div>
          </div>`;
      }

      if (notes === null) {
        anotacoes += '<p class="text-small" style="color:#dc2626;">Não foi possível carregar as anotações desta consulta.</p>';
      } else if (notes.length) {
        temAlguma = true;
        anotacoes += '<div style="display:flex; flex-direction:column; gap: var(--space-3);">'
          + notes.map(n => `
            <div style="background: var(--color-bg-subtle); border-left: 3px solid var(--color-primary); border-radius: var(--radius); padding: var(--space-3);">
              <div style="white-space: pre-wrap; line-height: var(--lh-normal);">${escapeHtmlGlobal(n.note)}</div>
              <div class="text-small text-muted" style="margin-top: var(--space-2);">
                ${n.author_name ? escapeHtmlGlobal(n.author_name) : '—'} · ${formatDateBR(n.created_at)}
              </div>
            </div>`).join('')
          + '</div>';
      }

      if (!temAlguma && notes !== null) {
        anotacoes += '<p class="text-small text-muted">Nenhuma anotação registrada ainda.</p>';
      }

      if (canRevisar) {
        anotacoes += `
          <div id="pront-revisar-box" style="display:none; margin-top: var(--space-3);">
            <textarea class="textarea" id="pront-note-input" rows="4"
                      placeholder="Escreva uma anotação para esta consulta..."></textarea>
            <div class="flex gap-3" style="margin-top: var(--space-2);">
              <button class="btn btn-primary" onclick="prontuarioAddNote()">Adicionar anotação</button>
              <button class="btn btn-ghost" onclick="prontuarioToggleRevisar(false)">Cancelar</button>
            </div>
          </div>
          <button class="btn btn-secondary" id="pront-revisar-btn" style="margin-top: var(--space-3);"
                  onclick="prontuarioToggleRevisar(true)">✎ Revisar — adicionar anotação</button>`;
      } else if (!viewMode && user && user.role === 'doctor') {
        anotacoes += '<p class="text-small text-muted" style="margin-top: var(--space-2);">Você só pode anotar nas consultas em que é a profissional responsável.</p>';
      }

      // ----- Documento completo -----
      return `
        <div class="pront-toolbar" style="display:flex; justify-content: space-between; align-items:center; gap: var(--space-3); margin-bottom: var(--space-4);">
          <button class="btn btn-ghost" onclick="closeProntuario()">← Voltar para as consultas</button>
          <button class="btn btn-ghost" onclick="window.print()">🖨 Imprimir</button>
        </div>
        <div class="card" id="pront-doc">
          <div style="text-align:center; margin-bottom: var(--space-5);">
            <h2 style="font-family: var(--font-display); letter-spacing: 0.04em;">PRONTUÁRIO MÉDICO</h2>
            <div class="text-small text-muted" style="margin-top: var(--space-2);">
              Consulta de ${formatDateBR(appt.scheduled_at)}
              ${appt.doctor_name ? ' · ' + escapeHtmlGlobal(appt.doctor_name) : ''}
              · ${statusLabels[appt.status] || appt.status}
            </div>
          </div>
          ${identificacao}
          ${responsavel}
          ${triagem}
          ${renderSocioeconomicCard(socio).replace('<div class="card"', '<div').replace('margin-top: var(--space-4);', '')}
          ${renderUploadsCard(uploads).replace('<div class="card"', '<div').replace('margin-top: var(--space-4);', '')}
          ${examesHtml}
          ${anotacoes}
        </div>`;
    }

    function prontuarioToggleRevisar(show) {
      const box = document.getElementById('pront-revisar-box');
      const btn = document.getElementById('pront-revisar-btn');
      if (box) box.style.display = show ? 'block' : 'none';
      if (btn) btn.style.display = show ? 'none' : 'inline-flex';
      if (show) { const ta = document.getElementById('pront-note-input'); if (ta) ta.focus(); }
    }

    async function prontuarioAddNote() {
      if (!prontuarioApptId) return;
      const ta = document.getElementById('pront-note-input');
      const note = (ta && ta.value || '').trim();
      if (!note) {
        toast.error('Escreva a anotação antes de adicionar.');
        if (ta) ta.focus();
        return;
      }
      try {
        await api.post('/appointments/notes/create', { appointment_id: prontuarioApptId, note });
        toast.success('Anotação adicionada.');
        await openProntuario(prontuarioApptId); // recarrega o prontuário com a nova anotação
      } catch (err) {
        toast.error(err.message || 'Erro ao adicionar anotação.');
      }
    }

    function renderExams(exams) {
      const user = api.getUser();
      const canAdd = user.role === 'doctor' && !viewMode;

      if (exams.length === 0) {
        document.getElementById('tab-exams').innerHTML = `
          <div class="empty-state">
            <div class="icon">🧬</div>
            <div>Nenhum exame molecular registrado.</div>
            ${canAdd ? `<div style="margin-top: var(--space-4);">
              <button class="btn btn-primary" onclick="openExamModal()">+ Registrar exame</button>
            </div>` : ''}
          </div>
        `;
        return;
      }

      const examTypeLabel = { pcr: 'PCR', southern_blotting: 'Southern Blotting' };
      const resultLabel = { positive: 'Positivo', negative: 'Negativo', inconclusive: 'Inconclusivo' };
      const resultClass = { positive: 'yes', negative: 'no', inconclusive: 'unknown' };

      document.getElementById('tab-exams').innerHTML = `
        ${canAdd ? `<div style="margin-bottom: var(--space-4);">
          <button class="btn btn-primary" onclick="openExamModal()">+ Registrar novo exame</button>
        </div>` : ''}
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Data</th>
                <th>Resultado</th>
                <th>Laboratório</th>
                <th>Registrado por</th>
                <th>Observações</th>
              </tr>
            </thead>
            <tbody>
              ${exams.map(e => `
                <tr>
                  <td><strong>${examTypeLabel[e.exam_type]}</strong></td>
                  <td>${formatDateOnly(e.exam_date)}</td>
                  <td><span class="answer-pill ${resultClass[e.result]}">${resultLabel[e.result]}</span></td>
                  <td>${escapeHtmlGlobal(e.laboratory || '—')}</td>
                  <td class="text-small">${escapeHtmlGlobal(e.registered_by)}</td>
                  <td class="text-small text-muted">${escapeHtmlGlobal(e.notes || '—')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderNotes(screening) {
      if (!screening) {
        document.getElementById('tab-notes').innerHTML =
          '<div class="empty-state"><div class="icon">📝</div>Selecione uma triagem.</div>';
        return;
      }

      // Modo somente leitura — só mostra o que tem, sem campos editáveis
      if (viewMode) {
        const hasNotes = !!(screening.clinical_notes && screening.clinical_notes.trim());
        document.getElementById('tab-notes').innerHTML = `
          <div class="card">
            <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-3);">
              Anotações clínicas — Triagem #${screening.id}
            </h3>
            ${hasNotes ? `
              <div style="white-space: pre-wrap; line-height: var(--lh-normal); padding: var(--space-3); background: var(--color-bg-subtle); border-radius: var(--radius); border-left: 4px solid var(--color-primary);">
                ${escapeHtmlGlobal(screening.clinical_notes)}
              </div>
              <div class="text-small text-muted" style="margin-top: var(--space-3);">
                ${screening.include_notes_in_report ? '✓ Incluído no relatório do paciente' : '🔒 Anotação privada (não visível ao paciente)'}
              </div>
            ` : `
              <div class="empty-state" style="padding: var(--space-4);">
                <div class="icon">📝</div>
                <div>Sem anotações registradas para esta triagem.</div>
                <div class="text-small text-muted" style="margin-top: var(--space-2);">
                  Para registrar anotações, abra o paciente pela aba "Minhas consultas".
                </div>
              </div>
            `}
          </div>
        `;
        return;
      }

      // Se há consulta AGENDADA desta médica, deixa anotar JÁ aqui (a anotação
      // vai pra essa consulta e aparece no prontuário). Sem consulta agendada,
      // a aba fica só-leitura (anota-se via Revisar no prontuário, após realizada).
      const hasNotes = !!(screening.clinical_notes && screening.clinical_notes.trim());
      const legacyBlock = hasNotes ? `
        <div style="margin-top: var(--space-4); padding-top: var(--space-3); border-top: 1px solid var(--color-border);">
          <div class="text-small text-muted" style="text-transform:uppercase; letter-spacing:0.04em; margin-bottom: var(--space-2);">Anotação registrada na triagem #${screening.id}</div>
          <div style="white-space: pre-wrap; line-height: var(--lh-normal); padding: var(--space-3); background: var(--color-bg-subtle); border-radius: var(--radius); border-left: 4px solid var(--color-primary);">
            ${escapeHtmlGlobal(screening.clinical_notes)}
          </div>
        </div>` : '';

      const upcoming = findNextOwnScheduled();
      if (upcoming) {
        document.getElementById('tab-notes').innerHTML = `
          <div class="card">
            <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-2);">
              Anotações da consulta de ${formatDateBR(upcoming.scheduled_at)}
            </h3>
            <p class="text-small text-muted" style="margin-bottom: var(--space-3);">
              Você pode adiantar as anotações desta consulta agendada — elas aparecem no prontuário.
            </p>
            <div id="notestab-list" style="margin-bottom: var(--space-3);"><div class="text-small text-muted">Carregando anotações...</div></div>
            <div class="field">
              <textarea class="textarea" id="notestab-input" rows="4" placeholder="Escreva uma anotação para esta consulta..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="addNotesTabNote(${upcoming.id})">Adicionar anotação</button>
            ${legacyBlock}
          </div>
        `;
        loadNotesTabNotes(upcoming.id);
        return;
      }

      // Sem consulta agendada -> só leitura.
      document.getElementById('tab-notes').innerHTML = `
        <div class="card">
          <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-3);">
            Anotações clínicas — Triagem #${screening.id}
          </h3>
          ${hasNotes ? `
            <div style="white-space: pre-wrap; line-height: var(--lh-normal); padding: var(--space-3); background: var(--color-bg-subtle); border-radius: var(--radius); border-left: 4px solid var(--color-primary);">
              ${escapeHtmlGlobal(screening.clinical_notes)}
            </div>
          ` : `
            <p class="text-small text-muted">Nenhuma anotação registrada nesta triagem.</p>
          `}
          <div style="background:#f4f0fb; border:1px solid #d9cdee; border-radius: var(--radius); margin-top: var(--space-4); padding: var(--space-3);">
            <div class="text-small">
              As anotações são feitas na consulta. Quando houver uma <strong>consulta agendada</strong>,
              você anota aqui; ou abra uma consulta <strong>"Realizada"</strong> no
              "Histórico de triagens" e use o botão <strong>Revisar</strong>.
            </div>
          </div>
        </div>
      `;
    }

    // Próxima consulta AGENDADA (de hoje em diante) desta médica — pra anotar adiantado.
    function findNextOwnScheduled() {
      if (!patientData || !patientData.appointments) return null;
      const user = api.getUser();
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const futures = patientData.appointments
        .filter(a => a.status === 'scheduled'
          && (!a.doctor_user_id || Number(a.doctor_user_id) === Number(user.id))
          && new Date(String(a.scheduled_at).replace(' ', 'T')) >= today)
        .sort((a, b) =>
            new Date(String(a.scheduled_at).replace(' ', 'T'))
          - new Date(String(b.scheduled_at).replace(' ', 'T')));
      return futures[0] || null;
    }

    async function loadNotesTabNotes(apptId) {
      const el = document.getElementById('notestab-list');
      if (!el) return;
      try {
        const res = await api.get('/appointments/notes/list?appointment_id=' + apptId);
        const notes = res.notes || [];
        el.innerHTML = notes.length
          ? '<div style="display:flex; flex-direction:column; gap: var(--space-3);">' + notes.map(n => `
              <div style="background: var(--color-bg-subtle); border-left: 3px solid var(--color-primary); border-radius: var(--radius); padding: var(--space-3);">
                <div style="white-space: pre-wrap; line-height: var(--lh-normal);">${escapeHtmlGlobal(n.note)}</div>
                <div class="text-small text-muted" style="margin-top: var(--space-2);">${n.author_name ? escapeHtmlGlobal(n.author_name) : '—'} · ${formatDateBR(n.created_at)}</div>
              </div>`).join('') + '</div>'
          : '<div class="text-small text-muted">Nenhuma anotação ainda nesta consulta.</div>';
      } catch (err) {
        el.innerHTML = '<div class="text-small" style="color:#dc2626;">Erro ao carregar anotações: ' + escapeHtmlGlobal(err.message || '') + '</div>';
      }
    }

    async function addNotesTabNote(apptId) {
      const ta = document.getElementById('notestab-input');
      const note = (ta && ta.value || '').trim();
      if (!note) { toast.error('Escreva a anotação antes de adicionar.'); if (ta) ta.focus(); return; }
      try {
        await api.post('/appointments/notes/create', { appointment_id: apptId, note });
        toast.success('Anotação adicionada.');
        if (ta) ta.value = '';
        loadNotesTabNotes(apptId);
      } catch (err) {
        toast.error(err.message || 'Erro ao adicionar anotação.');
      }
    }

    async function saveNotes() {
      try {
        await api.post('/screenings/review', {
          id: screeningDetail.screening.id,
          clinical_notes: document.getElementById('notes').value,
          include_notes_in_report: document.getElementById('include-report').checked,
        });
        toast.success('Anotações salvas.');
      } catch (err) {
        toast.error(err.message);
      }
    }

    async function reviewAndFinish() {
      const notes = (document.getElementById('notes').value || '').trim();
      if (notes.length === 0) {
        toast.error('Preencha uma anotação clínica antes de finalizar.');
        // foca no textarea
        const ta = document.getElementById('notes');
        if (ta) ta.focus();
        return;
      }

      // Tem consulta de hoje pra finalizar?
      const todayApt = findTodayAppointment();
      const apptMsg = todayApt
        ? '\n\nA consulta de hoje será marcada como REALIZADA.'
        : '\n\n(Nenhuma consulta agendada para hoje — só a triagem será revisada.)';
      if (!confirm('Confirmar revisão da triagem e finalização da consulta?' + apptMsg)) return;

      try {
        // 1) Revisa a triagem
        await api.post('/screenings/review', {
          id: screeningDetail.screening.id,
          status: 'reviewed',
          clinical_notes: notes,
          include_notes_in_report: document.getElementById('include-report').checked,
        });

        // 2) Finaliza a consulta de hoje, se houver
        if (todayApt) {
          try {
            await api.post('/appointments/update', {
              id: todayApt.id,
              status: 'completed',
            });
          } catch (err) {
            // Triagem já foi revisada — avisa mas não desfaz
            toast.error('Triagem revisada, mas não foi possível finalizar a consulta: ' + (err.message || ''));
            setTimeout(() => location.reload(), 1500);
            return;
          }
        }

        toast.success(todayApt
          ? 'Triagem revisada e consulta finalizada.'
          : 'Triagem revisada.');
        setTimeout(() => location.reload(), 800);
      } catch (err) {
        toast.error(err.message);
      }
    }

    /* ====== Tabs ====== */
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    /* ====== Modal de exame ====== */
    function openExamModal() {
      document.getElementById('exam-modal').style.display = 'grid';
      document.getElementById('exam-date').value = new Date().toISOString().slice(0, 10);
    }
    function closeExamModal() {
      document.getElementById('exam-modal').style.display = 'none';
    }
    async function submitExam() {
      const btn = document.getElementById('btn-submit-exam');
      // Valida antes de desabilitar o botão, pra não travar à toa
      const result = document.getElementById('exam-result').value;
      if (!result) {
        toast.error('Selecione o resultado do exame.');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      try {
        const payload = {
          patient_id:   patientId,
          screening_id: screeningDetail?.screening?.id || null,
          exam_type:    document.getElementById('exam-type').value,
          exam_date:    document.getElementById('exam-date').value,
          result:       result,
          laboratory:   document.getElementById('exam-lab').value,
          notes:        document.getElementById('exam-notes').value,
        };
        await api.post('/exams/register', payload);
        closeExamModal();
        resetExamForm();
        // Recarrega os dados e MANTÉM você na aba "Exames"
        // (antes a página recarregava e caía na "Visão geral").
        await loadAll();
        activateTab('exams');
        toast.success('Exame registrado com sucesso.');
      } catch (err) {
        toast.error(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Registrar exame';
      }
    }

    // Limpa o formulário do modal de exame depois de registrar.
    function resetExamForm() {
      const t = document.getElementById('exam-type');   if (t) t.value = 'pcr';
      const r = document.getElementById('exam-result'); if (r) r.value = '';
      const l = document.getElementById('exam-lab');    if (l) l.value = '';
      const n = document.getElementById('exam-notes');  if (n) n.value = '';
    }

    // Ativa uma aba pelo nome (mesma lógica do clique nas abas).
    function activateTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      const tabBtn  = document.querySelector('.tab[data-tab="' + name + '"]');
      const content = document.getElementById('tab-' + name);
      if (tabBtn)  tabBtn.classList.add('active');
      if (content) content.classList.add('active');
    }

    loadAll();
  </script>
</body>
</html>
