<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus exames — SGX</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

  <div class="dash" id="dash-root">
    <main class="dash-main">

      <header class="dash-header">
        <div>
          <h1 class="dash-title">Meus exames e resultado da triagem</h1>
          <p class="dash-subtitle">Detalhes do seu acompanhamento clínico.</p>
        </div>
      </header>

      <div id="content">
        <div class="empty-state">Carregando...</div>
      </div>

    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/shared.js"></script>
  <script>
    if (!requireAuth(['patient'])) { /* redireciona */ }

    document.getElementById('dash-root').insertAdjacentHTML('afterbegin', renderSidebar('exams'));

    async function load() {
      try {
        const data = await api.get('/patients/me');
        renderContent(data);
      } catch (err) {
        if (err.status === 401) {
          api.clearSession();
          location.href = 'login.html';
          return;
        }
        if (err.status === 404) {
          document.getElementById('content').innerHTML = `
            <div class="empty-state">
              <div class="icon">🧬</div>
              <p>Você ainda não tem cadastro de paciente.</p>
              <a href="triagem.html" class="btn btn-primary" style="margin-top: var(--space-4);">
                Iniciar triagem →
              </a>
            </div>
          `;
          return;
        }
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <p>${escapeHtmlGlobal(err.message || 'Erro ao carregar.')}</p>
          </div>
        `;
      }
    }

    function renderContent(data) {
      const exams = data.exams || [];

      // Sem exames ainda → tela genérica
      if (exams.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="icon">🧬</div>
            <p style="margin-bottom: var(--space-3);">Nenhum exame molecular registrado ainda.</p>
            <p class="text-small text-muted" style="max-width: 480px; margin: 0 auto;">
              Após a análise clínica da sua triagem, se houver indicação de exame confirmatório
              (PCR ou Southern Blotting), o resultado aparecerá aqui assim que for registrado pelo médico.
              Junto com o resultado do exame, você terá acesso ao detalhamento da sua triagem.
            </p>
          </div>
        `;
        return;
      }

      // Tem exame registrado → mostra exames + detalhes da triagem + anotações
      const examTypeLabel = { pcr: 'PCR', southern_blotting: 'Southern Blotting' };
      const resultLabel   = { positive: 'Positivo', negative: 'Negativo', inconclusive: 'Inconclusivo' };
      const resultClass   = { positive: 'yes', negative: 'no', inconclusive: 'unknown' };
      const ansLabel      = { yes: 'Sim', no: 'Não', unknown: 'Não sei' };
      const catLabel      = { development: 'Desenvolvimento', behavioral: 'Comportamento', physical: 'Características físicas' };

      const details = data.screening_details;

      let html = `
        <!-- Exames moleculares -->
        <div class="table-wrapper" style="margin-bottom: var(--space-5);">
          <div class="table-toolbar">
            <h3>Exames moleculares</h3>
            <span class="text-small text-muted">${exams.length} exame${exams.length !== 1 ? 's' : ''}</span>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>Tipo</th>
                <th>Data</th>
                <th>Resultado</th>
                <th>Laboratório</th>
                <th>Registrado por</th>
              </tr>
            </thead>
            <tbody>
              ${exams.map(e => `
                <tr>
                  <td><strong>${examTypeLabel[e.exam_type] || e.exam_type}</strong></td>
                  <td>${formatDateOnly(e.exam_date)}</td>
                  <td><span class="answer-pill ${resultClass[e.result] || 'unknown'}">${resultLabel[e.result] || e.result}</span></td>
                  <td>${escapeHtmlGlobal(e.laboratory || '—')}</td>
                  <td class="text-small text-muted">${escapeHtmlGlobal(e.registered_by || '—')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      // Detalhes da triagem (só aparece se houver exame registrado, regra de negócio)
      if (details) {
        html += `
          <h2 style="font-family: var(--font-display); font-size: var(--fs-2xl); font-weight: 500; margin: var(--space-6) 0 var(--space-4);">
            Detalhes da sua triagem
          </h2>

          <div class="card" style="margin-bottom: var(--space-4);">
            <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-3);">
              Suas respostas
            </h3>
            <p class="text-small text-muted" style="margin-bottom: var(--space-4);">
              Estas foram as respostas que você forneceu durante o questionário inicial:
            </p>
            <div class="indicator-summary">
              ${Object.entries(details.answers_by_category).map(([cat, items]) => {
                if (!items || items.length === 0) return '';
                return `
                  <div class="indicator-cat">
                    <h4>${catLabel[cat] || cat}</h4>
                    ${items.map(i => `
                      <div class="indicator-row">
                        <span class="label">${escapeHtmlGlobal(i.lay_label)}</span>
                        <span class="answer-pill ${i.answer}">${ansLabel[i.answer] || i.answer}</span>
                      </div>
                    `).join('')}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;

        // Anotações do médico — só se foram marcadas para incluir no relatório
        if (details.clinical_notes) {
          html += `
            <div class="card" style="border-left: 4px solid var(--color-primary); margin-bottom: var(--space-4);">
              <h3 style="font-family: var(--font-body); font-size: var(--fs-base); margin-bottom: var(--space-2);">
                Observações do(a) profissional
              </h3>
              ${details.reviewed_by ? `
                <p class="text-small text-muted" style="margin-bottom: var(--space-3);">
                  Por ${escapeHtmlGlobal(details.reviewed_by)}${details.reviewed_at ? ' em ' + formatDateBR(details.reviewed_at) : ''}
                </p>
              ` : ''}
              <div style="white-space: pre-wrap; line-height: var(--lh-normal);">
                ${escapeHtmlGlobal(details.clinical_notes)}
              </div>
            </div>
          `;
        }
      }

      html += `
        <div style="margin-top: var(--space-5); padding: var(--space-4); background: var(--color-primary-50); border-radius: var(--radius); font-size: var(--fs-sm); color: var(--color-text-muted);">
          ℹ️ Em caso de dúvidas sobre o resultado de algum exame, agende uma consulta com seu médico
          para uma orientação personalizada. Estes resultados <strong>não substituem</strong> avaliação clínica presencial.
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    load();
  </script>
</body>
</html>
