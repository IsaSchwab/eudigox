<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus exames — SGX</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

  <div class="dash" id="dash-root">
    <main class="dash-main">

      <header class="dash-header">
        <div>
          <h1 class="dash-title">Meus exames e triagens</h1>
          <p class="dash-subtitle">Suas respostas e os exames, organizados por triagem.</p>
        </div>
      </header>

      <div id="content">
        <div class="empty-state">Carregando...</div>
      </div>

    </main>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/shared.js"></script>
  <script>
    if (!requireAuth(['patient'])) { /* redireciona */ }

    document.getElementById('dash-root').insertAdjacentHTML('afterbegin', renderSidebar('exams'));

    const examTypeLabel = { pcr: 'PCR', southern_blotting: 'Southern Blotting' };
    const resultLabel   = { positive: 'Positivo', negative: 'Negativo', inconclusive: 'Inconclusivo' };
    const resultClass   = { positive: 'yes', negative: 'no', inconclusive: 'unknown' };
    const ansLabel      = { yes: 'Sim', no: 'Não', unknown: 'Não sei' };
    const catLabel      = { development: 'Desenvolvimento', behavioral: 'Comportamento', physical: 'Características físicas' };
    const screeningStatusLabel = { draft: 'Rascunho', submitted: 'Enviada para análise', reviewed: 'Revisada pela equipe', closed: 'Encerrada' };

    async function load() {
      try {
        const data = await api.get('/patients/me');
        renderContent(data);
      } catch (err) {
        if (err.status === 401) { api.clearSession(); location.href = 'login.html'; return; }
        if (err.status === 404) {
          document.getElementById('content').innerHTML = `
            <div class="empty-state">
              <div class="icon">🧬</div>
              <p>Você ainda não tem cadastro de paciente.</p>
              <a href="triagem.html" class="btn btn-primary" style="margin-top: var(--space-4);">Iniciar triagem →</a>
            </div>`;
          return;
        }
        document.getElementById('content').innerHTML = `
          <div class="empty-state"><div class="icon">⚠️</div><p>${escapeHtmlGlobal(err.message || 'Erro ao carregar.')}</p></div>`;
      }
    }

    function renderExamsTable(exams) {
      return `
        <div class="table-wrapper" style="margin-top: var(--space-3);">
          <table class="data-table">
            <thead>
              <tr><th>Tipo</th><th>Data</th><th>Resultado</th><th>Laboratório</th></tr>
            </thead>
            <tbody>
              ${exams.map(e => `
                <tr>
                  <td><strong>${examTypeLabel[e.exam_type] || e.exam_type}</strong></td>
                  <td>${formatDateOnly(e.exam_date)}</td>
                  <td><span class="answer-pill ${resultClass[e.result] || 'unknown'}">${resultLabel[e.result] || e.result}</span></td>
                  <td class="text-small text-muted">${escapeHtmlGlobal(e.laboratory || '—')}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    function renderAnswersDetails(abc) {
      const cats = Object.entries(abc || {}).filter(([, items]) => items && items.length);
      if (!cats.length) return '';
      return `
        <details style="margin-top: var(--space-3);">
          <summary style="cursor:pointer; font-size: var(--fs-sm); font-weight:600; color: var(--color-primary);">
            Ver as respostas que você marcou nesta triagem
          </summary>
          <div class="indicator-summary" style="margin-top: var(--space-3);">
            ${cats.map(([cat, items]) => `
              <div class="indicator-cat">
                <h4>${catLabel[cat] || cat}</h4>
                ${items.map(i => `
                  <div class="indicator-row">
                    <span class="label">${escapeHtmlGlobal(i.lay_label)}</span>
                    <span class="answer-pill ${i.answer}">${ansLabel[i.answer] || i.answer}</span>
                  </div>`).join('')}
              </div>`).join('')}
          </div>
        </details>`;
    }

    function renderContent(data) {
      const screenings = data.screenings || [];
      const exams = data.exams || [];

      if (screenings.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <div class="icon">🧬</div>
            <p style="margin-bottom: var(--space-3);">Você ainda não tem triagens registradas.</p>
            <a href="nova-triagem.html" class="btn btn-primary">Iniciar triagem →</a>
          </div>`;
        return;
      }

      // Agrupa os exames pela triagem de origem (screening_id).
      const examsBySid = {};
      const orphan = [];
      exams.forEach(e => {
        const match = e.screening_id && screenings.some(s => Number(s.id) === Number(e.screening_id));
        if (match) { (examsBySid[e.screening_id] = examsBySid[e.screening_id] || []).push(e); }
        else { orphan.push(e); }
      });

      let html = '';
      screenings.forEach((s, idx) => {
        const sExams = examsBySid[s.id] || [];
        html += `
          <div class="card" style="margin-bottom: var(--space-4);">
            <div style="display:flex; justify-content:space-between; align-items:center; gap: var(--space-3); flex-wrap:wrap;">
              <h3 style="font-family: var(--font-display); font-size: var(--fs-xl); font-weight: 500; margin: 0;">
                Triagem de ${formatDateBR(s.submitted_at || s.created_at)}
                ${idx === 0 ? '<span class="text-small text-muted" style="font-family: var(--font-body); font-weight:400;"> (mais recente)</span>' : ''}
              </h3>
              <span class="badge badge-info">${screeningStatusLabel[s.status] || s.status}</span>
            </div>
            ${ sExams.length
              ? renderExamsTable(sExams)
              : `<p class="text-small text-muted" style="margin-top: var(--space-3);">Nenhum exame registrado para esta triagem ainda. Se houver indicação, o resultado aparece aqui.</p>` }
            ${ renderAnswersDetails(s.answers_by_category) }
          </div>`;
      });

      if (orphan.length) {
        html += `
          <div class="card" style="margin-bottom: var(--space-4);">
            <h3 style="font-family: var(--font-display); font-size: var(--fs-xl); font-weight: 500; margin: 0 0 var(--space-2);">Outros exames</h3>
            <p class="text-small text-muted" style="margin:0;">Exames sem triagem associada.</p>
            ${renderExamsTable(orphan)}
          </div>`;
      }

      html += `
        <div style="margin-top: var(--space-5); padding: var(--space-4); background: var(--color-primary-50); border-radius: var(--radius); font-size: var(--fs-sm); color: var(--color-text-muted);">
          ℹ️ Em caso de dúvidas sobre o resultado de algum exame, agende uma consulta com seu médico.
          Estes resultados <strong>não substituem</strong> avaliação clínica presencial.
        </div>`;

      document.getElementById('content').innerHTML = html;
    }

    load();
  </script>
</body>
</html>
