<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda — SGX Admin</title>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

  <div class="dash" id="dash-root">
    <main class="dash-main">

      <header class="dash-header">
        <div>
          <h1 class="dash-title">Agenda de consultas</h1>
          <p class="dash-subtitle">Agende consultas vinculando paciente e profissional.</p>
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()">+ Agendar consulta</button>
      </header>

      <!-- Filtros -->
      <div class="filters">
        <div class="field">
          <label for="f-status">Filtrar por status</label>
          <select class="select" id="f-status" onchange="loadAppointments()">
            <option value="">Todos</option>
            <option value="scheduled" selected>Agendadas</option>
            <option value="completed">Realizadas</option>
            <option value="cancelled">Canceladas</option>
            <option value="no_show">Não compareceu</option>
          </select>
        </div>
      </div>

      <div class="table-wrapper">
        <div class="table-toolbar">
          <h3>Consultas</h3>
          <span class="text-small text-muted" id="result-count">—</span>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th>Paciente</th>
              <th>Profissional</th>
              <th>Data/hora</th>
              <th>Local</th>
              <th>Status</th>
              <th class="col-actions">Ações</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="empty-state">Carregando...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal Criar -->
  <div id="create-modal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3>Agendar nova consulta</h3>
          <p class="text-small text-muted">Vincule um paciente a um profissional.</p>
        </div>
        <button class="modal-close" onclick="closeCreateModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="c-patient">Paciente</label>
          <select class="select" id="c-patient">
            <option value="">Carregando pacientes...</option>
          </select>
        </div>
        <div class="field">
          <label for="c-doctor">Profissional</label>
          <select class="select" id="c-doctor">
            <option value="">Carregando profissionais...</option>
          </select>
        </div>
        <div class="grid gap-4" style="grid-template-columns: 1fr 1fr;">
          <div class="field">
            <label for="c-date">Data</label>
            <input class="input" id="c-date" type="date">
          </div>
          <div class="field">
            <label for="c-time">Horário</label>
            <input class="input" id="c-time" type="time" value="09:00">
          </div>
        </div>
        <div class="field">
          <label for="c-location">Local (opcional)</label>
          <input class="input" id="c-location" type="text" placeholder="Ex: Consultório 3, Hospital Universitário">
        </div>
        <div class="field">
          <label for="c-notes">Observações (opcional)</label>
          <textarea class="textarea" id="c-notes" rows="3" placeholder="Lembretes, preparação, etc."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeCreateModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitCreate()" id="btn-create">Agendar consulta</button>
      </div>
    </div>
  </div>

  <!-- Modal Editar -->
  <div id="edit-modal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3>Editar consulta</h3>
          <p class="text-small text-muted" id="e-subtitle">—</p>
        </div>
        <button class="modal-close" onclick="closeEditModal()">×</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="e-id">
        <div class="grid gap-4" style="grid-template-columns: 1fr 1fr;">
          <div class="field">
            <label for="e-date">Data</label>
            <input class="input" id="e-date" type="date">
          </div>
          <div class="field">
            <label for="e-time">Horário</label>
            <input class="input" id="e-time" type="time">
          </div>
        </div>
        <div class="field">
          <label for="e-location">Local</label>
          <input class="input" id="e-location" type="text">
        </div>
        <div class="field">
          <label for="e-status">Status</label>
          <select class="select" id="e-status">
            <option value="scheduled">Agendada</option>
            <option value="completed">Realizada</option>
            <option value="cancelled">Cancelada</option>
            <option value="no_show">Não compareceu</option>
          </select>
        </div>
        <div class="field">
          <label for="e-notes">Observações</label>
          <textarea class="textarea" id="e-notes" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitEdit()" id="btn-edit">Salvar alterações</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/shared.js"></script>
  <script>
    if (!requireAuth(['admin'])) { /* redireciona */ }
    document.getElementById('dash-root').insertAdjacentHTML('afterbegin', renderSidebar('appointments'));

    let apptsList   = [];
    let patients    = [];
    let professionals = [];

    const STATUS_LABELS = {
      scheduled: 'Agendada',
      completed: 'Realizada',
      cancelled: 'Cancelada',
      no_show:   'Não compareceu',
    };
    const STATUS_BADGES = {
      scheduled: '<span class="badge badge-info">Agendada</span>',
      completed: '<span class="answer-pill no">Realizada</span>',
      cancelled: '<span class="answer-pill yes">Cancelada</span>',
      no_show:   '<span class="answer-pill unknown">Não compareceu</span>',
    };

    async function loadAppointments() {
      const status = document.getElementById('f-status').value;
      const tbody  = document.getElementById('tbody');
      tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Carregando...</td></tr>';

      try {
        const path = '/appointments/list' + (status ? `?status=${status}` : '');
        const list = await api.get(path);
        apptsList = list;
        document.getElementById('result-count').textContent =
          `${list.length} consulta${list.length !== 1 ? 's' : ''}`;

        if (list.length === 0) {
          tbody.innerHTML = `<tr><td colspan="6" class="empty-state">
            <div class="icon">📅</div>
            <div>Nenhuma consulta encontrada.</div>
          </td></tr>`;
          return;
        }

        tbody.innerHTML = list.map(a => `
          <tr>
            <td>
              <div class="patient-cell">
                <div class="avatar">${getPatientInitials(a.patient_name)}</div>
                <div>
                  <div class="name">${escapeHtmlGlobal(a.patient_name)}</div>
                  <div class="meta">ID #${a.patient_id}</div>
                </div>
              </div>
            </td>
            <td class="text-small">${escapeHtmlGlobal(a.doctor_name)}</td>
            <td class="text-small">${formatDateBR(a.scheduled_at)}</td>
            <td class="text-small text-muted">${escapeHtmlGlobal(a.location || '—')}</td>
            <td>${STATUS_BADGES[a.status] || a.status}</td>
            <td class="col-actions">
              <button class="btn btn-secondary btn-sm" onclick="openEditModal(${a.id})">Editar</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">
          <div class="icon">⚠️</div>${escapeHtmlGlobal(err.message)}</td></tr>`;
      }
    }

    /* ====== Carregar pacientes e profissionais ====== */
    async function loadFormOptions() {
      try {
        const [pats, profs] = await Promise.all([
          api.get('/patients/list'),
          api.get('/users/list'),
        ]);
        patients      = pats;
        professionals = profs.filter(p => ['doctor', 'nurse'].includes(p.role) && p.is_active);

        const patSel = document.getElementById('c-patient');
        patSel.innerHTML = '<option value="">Selecione um paciente...</option>' +
          patients.map(p => `<option value="${p.id}">${escapeHtmlGlobal(p.full_name)} (#${p.id})</option>`).join('');

        const docSel = document.getElementById('c-doctor');
        docSel.innerHTML = '<option value="">Selecione um profissional...</option>' +
          professionals.map(p =>
            `<option value="${p.id}">${escapeHtmlGlobal(p.full_name)} — ${p.role === 'doctor' ? 'Médico(a)' : 'Enfermeiro(a)'}</option>`
          ).join('');
      } catch (err) {
        toast.error('Não foi possível carregar pacientes e profissionais: ' + err.message);
      }
    }

    /* ====== Criar ====== */
    function openCreateModal() {
      document.getElementById('create-modal').style.display = 'grid';
      document.getElementById('c-date').value = new Date().toISOString().slice(0, 10);
      document.getElementById('c-location').value = '';
      document.getElementById('c-notes').value = '';
    }
    function closeCreateModal() {
      document.getElementById('create-modal').style.display = 'none';
    }

    async function submitCreate() {
      const btn = document.getElementById('btn-create');
      const patientId = document.getElementById('c-patient').value;
      const doctorId  = document.getElementById('c-doctor').value;
      const date      = document.getElementById('c-date').value;
      const time      = document.getElementById('c-time').value;

      if (!patientId)  { toast.error('Selecione um paciente.');     return; }
      if (!doctorId)   { toast.error('Selecione um profissional.'); return; }
      if (!date || !time) { toast.error('Informe data e horário.'); return; }

      btn.disabled = true;
      btn.textContent = 'Agendando...';
      try {
        await api.post('/appointments/create', {
          patient_id:     parseInt(patientId, 10),
          doctor_user_id: parseInt(doctorId, 10),
          scheduled_at:   `${date} ${time}:00`,
          location:       document.getElementById('c-location').value,
          notes:          document.getElementById('c-notes').value,
        });
        toast.success('Consulta agendada.');
        closeCreateModal();
        loadAppointments();
      } catch (err) {
        toast.error(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Agendar consulta';
      }
    }

    /* ====== Editar ====== */
    function openEditModal(id) {
      const a = apptsList.find(x => x.id === id);
      if (!a) return;

      const dt = new Date(a.scheduled_at.replace(' ', 'T'));
      const datePart = dt.toISOString().slice(0, 10);
      const timePart = dt.toTimeString().slice(0, 5);

      document.getElementById('e-id').value       = a.id;
      document.getElementById('e-subtitle').textContent =
        `${a.patient_name} com ${a.doctor_name}`;
      document.getElementById('e-date').value     = datePart;
      document.getElementById('e-time').value     = timePart;
      document.getElementById('e-location').value = a.location || '';
      document.getElementById('e-status').value   = a.status;
      document.getElementById('e-notes').value    = a.notes || '';
      document.getElementById('edit-modal').style.display = 'grid';
    }
    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    async function submitEdit() {
      const btn = document.getElementById('btn-edit');
      btn.disabled = true;
      btn.textContent = 'Salvando...';
      try {
        const payload = {
          id:       parseInt(document.getElementById('e-id').value, 10),
          scheduled_at: `${document.getElementById('e-date').value} ${document.getElementById('e-time').value}:00`,
          location: document.getElementById('e-location').value,
          status:   document.getElementById('e-status').value,
          notes:    document.getElementById('e-notes').value,
        };
        await api.post('/appointments/update', payload);
        toast.success('Consulta atualizada.');
        closeEditModal();
        loadAppointments();
      } catch (err) {
        toast.error(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar alterações';
      }
    }

    // Init
    loadFormOptions();
    loadAppointments();
  </script>
</body>
</html>
